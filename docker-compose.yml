services:
  postgres:
    image: postgres:16-alpine
    container_name: qa-automation-accelerator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password
      POSTGRES_DB: qa_automation_accelerator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d qa_automation_accelerator"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
